<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BankApp — Goals</title>
<link rel="stylesheet" href="/app.css" />
<script src="/vendor/chart.umd.js"></script>
<script src="/app.js"></script>

<main>
  <h1 class="page-title">Goals</h1>
  <p class="page-sub">Where the money you keep is headed.</p>

  <section class="block">
    <div class="block-head">
      <button class="btn" id="new-goal">＋ New goal</button>
    </div>
    <div class="panel" id="goals"></div>
  </section>

  <section class="block">
    <details id="archived-block">
      <summary>Archived</summary>
      <div class="panel" id="archived"></div>
    </details>
  </section>
</main>

<script>
  (async function () {
    await App.nav();
    await App.loadMeta();

    const CURRENCIES = (App.meta && App.meta.known_currencies) || ["CAD"];
    const expOf = (ccy) => (App.meta.currencies && App.meta.currencies[ccy] != null)
      ? App.meta.currencies[ccy] : 2;

    function paceBadge(g) {
      if (g.pace === "behind") return { cls: "pace", txt: "behind" };
      if (g.pace === "no_target") return { cls: "role", txt: "no target date" };
      return { cls: "ok", txt: "on track" };
    }

    function actionBtn(cls, label, onclick) {
      const b = document.createElement("button");
      b.className = "btn mini ghost " + cls;
      b.textContent = label;
      b.onclick = onclick;
      return b;
    }

    // `projMap` is goal_id -> {status, allocated_minor, ask_minor} built from
    // /api/projection's per-currency goal_funding rows, or null/absent if that
    // fetch failed. Only active (non-archived) goals get a this-month chip.
    function goalRow(g, archived, projMap) {
      const pct = Math.max(0, Math.min(100, g.pct_complete || 0));
      const badge = paceBadge(g);
      const row = document.createElement("div");
      row.className = "bar-row";

      const isFixed = g.funding_mode === "fixed_monthly";
      // A fixed bucket with no target is a perpetual pot — a progress bar toward
      // zero is meaningless, so it skips the bar and shows a running total instead.
      const isPerpetual = isFixed && g.target_minor === 0;

      let badges =
        `<span class="badge ${badge.cls}">${badge.txt}</span> ` +
        `<span class="badge role">${g.allocation_pct}% alloc</span>`;

      if (isFixed) {
        badges += ` <span class="badge role">${App.fmtMoney(g.monthly_minor, g.currency)}/mo · fixed</span>`;
      } else if (g.monthly_ask_minor > 0) {
        badges += ` <span class="badge role">asks ${App.fmtMoney(g.monthly_ask_minor, g.currency)}/mo</span>`;
      }

      if (g.priority !== 100) {
        badges += ` <span class="badge role">p${g.priority}</span>`;
      }

      if (!archived && projMap && projMap.has(g.id)) {
        const chipByStatus = {
          funded: ["ok", "funded"],
          partial: ["pace", "partial"],
          starved: ["over", "starved"],
        };
        const pf = projMap.get(g.id);
        const chip = chipByStatus[pf.status];
        if (chip) {
          const tip = `${App.fmtMoney(pf.allocated_minor, g.currency)} of ` +
            `${App.fmtMoney(pf.ask_minor, g.currency)} set aside this month`;
          badges += ` <span class="badge ${chip[0]}" title="${tip}">this month: ${chip[1]}</span>`;
        }
      }

      const amt = isPerpetual
        ? `${App.fmtMoney(g.funded_minor, g.currency)} saved`
        : `${App.fmtMoney(g.funded_minor, g.currency)} / ` +
          `${App.fmtMoney(g.target_minor, g.currency)} · ${pct.toFixed(0)}%`;

      const head = document.createElement("div");
      head.className = "bar-head";
      head.innerHTML =
        `<span class="cat">${App.esc(g.name)} ${badges}</span>` +
        `<span class="amt">${amt}</span>`;
      row.appendChild(head);

      if (!isPerpetual) {
        const track = document.createElement("div");
        track.className = "bar-track";
        const fill = document.createElement("div");
        fill.className = "bar-fill" + (g.pace === "behind" ? " pace" : "");
        fill.style.width = pct + "%";
        track.appendChild(fill);
        row.appendChild(track);
      }

      const actions = document.createElement("div");
      actions.className = "goal-actions";
      if (archived) {
        actions.appendChild(actionBtn("goal-unarchive", "Unarchive", async () => {
          // Unarchiving re-spends allocation, so the server can refuse with a 400.
          try { await App.post(`/api/goals/${g.id}/unarchive`, {}); } catch (_) { return; }
          App.notice(`Restored ${g.name}`);
          render();
        }));
      } else {
        actions.appendChild(actionBtn("goal-edit", "Edit", () => openGoalModal(g)));
        actions.appendChild(actionBtn("goal-archive", "Archive", async () => {
          try { await App.post(`/api/goals/${g.id}/archive`, {}); } catch (_) { return; }
          App.notice(`Archived ${g.name} — find it under Archived`);
          render();
        }));
      }
      row.appendChild(actions);
      return row;
    }

    async function render() {
      // Fire both fetches together — the funding-chip projection doesn't depend
      // on the goals response, so there's no reason to pay two serial round-trips.
      const allPromise = App.api("/api/goals?include_archived=true");
      // This-month funding chips are a nice-to-have on top of the goals list —
      // if /api/projection fails, degrade to rows without chips rather than
      // breaking the page. (.catch here so a failure can't become an unhandled
      // rejection while we await the goals fetch first.)
      const projPromise = App.api("/api/projection").catch(() => []);
      const all = await allPromise;
      let projMap = new Map();
      try {
        const projection = await projPromise;
        for (const row of projection) {
          for (const gf of row.goal_funding || []) {
            projMap.set(gf.goal_id, { status: gf.status, allocated_minor: gf.allocated_minor, ask_minor: gf.ask_minor });
          }
        }
      } catch (_) {
        projMap = new Map();
      }

      const active = all.filter((g) => g.active);
      const archived = all.filter((g) => !g.active);

      const wrap = App.el("goals");
      wrap.innerHTML = "";
      if (!active.length) {
        App.empty(wrap, "No goals yet. Use <b>＋ New goal</b> to add one.");
      } else {
        for (const g of active) wrap.appendChild(goalRow(g, false, projMap));
      }

      const block = App.el("archived-block");
      block.style.display = archived.length ? "" : "none";
      block.querySelector("summary").textContent = `Archived (${archived.length})`;
      const arcWrap = App.el("archived");
      arcWrap.innerHTML = "";
      for (const g of archived) arcWrap.appendChild(goalRow(g, true, projMap));
    }

    function field(card, label, input, hint) {
      const fld = document.createElement("div");
      fld.className = "fld";
      const lbl = document.createElement("label");
      lbl.textContent = label;
      fld.appendChild(lbl);
      fld.appendChild(input);
      if (hint) {
        const h = document.createElement("div");
        h.className = "hint";
        h.textContent = hint;
        fld.appendChild(h);
      }
      card.appendChild(fld);
      return input;
    }

    // `existing` is a goal object when editing, null when creating.
    function openGoalModal(existing) {
      // A second click while one is open would stack overlays; only the top one is
      // reachable and closing it reveals a stale twin.
      if (document.querySelector(".modal")) return;
      const overlay = document.createElement("div");
      overlay.className = "modal";
      const card = document.createElement("div");
      card.className = "modal-card";
      overlay.appendChild(card);

      const title = document.createElement("h3");
      title.textContent = existing ? "Edit goal" : "New goal";
      card.appendChild(title);

      const name = document.createElement("input");
      name.value = existing ? existing.name : "";
      name.placeholder = "e.g. japan-trip";
      field(card, "Name", name);

      // Funding mode: 'target_date' self-computes its monthly ask from what's left
      // and the time remaining; 'fixed_monthly' sets aside a flat amount, funded
      // first when money is tight.
      const modeWrap = document.createElement("div");
      modeWrap.className = "radios";
      const modeTargetLbl = document.createElement("label");
      const modeTarget = document.createElement("input");
      modeTarget.type = "radio";
      modeTarget.name = "funding_mode";
      modeTarget.value = "target_date";
      modeTargetLbl.appendChild(modeTarget);
      modeTargetLbl.appendChild(document.createTextNode("Save toward a target"));
      const modeFixedLbl = document.createElement("label");
      const modeFixed = document.createElement("input");
      modeFixed.type = "radio";
      modeFixed.name = "funding_mode";
      modeFixed.value = "fixed_monthly";
      modeFixedLbl.appendChild(modeFixed);
      modeFixedLbl.appendChild(document.createTextNode("Fixed monthly amount"));
      modeWrap.appendChild(modeTargetLbl);
      modeWrap.appendChild(modeFixedLbl);
      if (existing && existing.funding_mode === "fixed_monthly") modeFixed.checked = true;
      else modeTarget.checked = true;
      field(card, "Funding mode", modeWrap,
            "Target goals compute their own monthly ask from what's left and the time " +
            "remaining. Fixed buckets set aside the same amount every month, first.");

      const monthly = document.createElement("input");
      monthly.value = existing && existing.monthly_minor != null
        ? (existing.monthly_minor / Math.pow(10, expOf(existing.currency))).toFixed(expOf(existing.currency))
        : "";
      monthly.placeholder = "500.00";
      field(card, "Monthly amount", monthly, "Set aside every month, before fun money.");
      // field() appends `monthly` straight into the `.fld` wrapper it just built,
      // so the wrapper is `monthly`'s parent right after the call returns.
      const monthlyFld = monthly.parentElement;
      const updateMonthlyVisibility = () => {
        monthlyFld.style.display = modeFixed.checked ? "" : "none";
      };
      modeTarget.addEventListener("change", updateMonthlyVisibility);
      modeFixed.addEventListener("change", updateMonthlyVisibility);
      updateMonthlyVisibility();

      const target = document.createElement("input");
      target.value = existing
        ? (existing.target_minor / Math.pow(10, expOf(existing.currency))).toFixed(expOf(existing.currency))
        : "";
      target.placeholder = "3000.00";
      field(card, "Target", target,
            "The total you're saving toward. Optional for fixed buckets (0 = perpetual).");

      const currency = document.createElement("select");
      for (const c of CURRENCIES) {
        const o = document.createElement("option");
        o.value = c;
        o.textContent = c;
        if (existing ? existing.currency === c : c === "CAD") o.selected = true;
        currency.appendChild(o);
      }
      field(card, "Currency", currency);

      const start = document.createElement("input");
      start.type = "date";
      start.value = existing ? existing.start_date : new Date().toISOString().slice(0, 10);
      field(card, "Start date", start, "Progress counts net savings from this date.");

      const tgtDate = document.createElement("input");
      tgtDate.type = "date";
      tgtDate.value = existing && existing.target_date ? existing.target_date : "";
      field(card, "Target date (optional)", tgtDate, "Leave blank for no pace tracking.");

      const alloc = document.createElement("input");
      alloc.type = "number";
      alloc.min = "0";
      alloc.max = "100";
      alloc.value = existing ? existing.allocation_pct : "100";
      field(card, "Allocation %", alloc,
            "Share of that currency's net savings credited to this goal.");

      const priority = document.createElement("input");
      priority.type = "number";
      priority.min = "0";
      priority.max = "999";
      priority.value = existing && existing.priority != null ? existing.priority : "100";
      field(card, "Priority", priority, "Lower = funded first when money is tight.");

      const note = document.createElement("input");
      note.value = existing && existing.note ? existing.note : "";
      field(card, "Note (optional)", note);

      const actions = document.createElement("div");
      actions.className = "modal-actions";
      const cancel = document.createElement("button");
      cancel.className = "btn ghost";
      cancel.textContent = "Cancel";
      const save = document.createElement("button");
      save.className = "btn";
      save.textContent = "Save";
      actions.appendChild(cancel);
      actions.appendChild(save);
      card.appendChild(actions);

      const close = () => overlay.remove();
      cancel.onclick = close;
      overlay.addEventListener("click", (ev) => { if (ev.target === overlay) close(); });

      save.onclick = async () => {
        const fundingMode = modeFixed.checked ? "fixed_monthly" : "target_date";
        const body = {
          name: name.value,
          target: target.value || null,
          currency: currency.value,
          start_date: start.value,
          target_date: tgtDate.value || null,
          allocation_pct: Number(alloc.value),
          note: note.value || null,
          funding_mode: fundingMode,
          // A hidden leftover value in the monthly field must not sneak into a
          // target_date save and trip the server's "must not be set" 400.
          monthly: fundingMode === "fixed_monthly" ? (monthly.value || null) : null,
          // Number("") is 0 — a cleared field must fall back to the default (100),
          // not silently jump the queue as top priority.
          priority: priority.value === "" ? 100 : Number(priority.value),
        };
        save.disabled = true;
        try {
          // App.post surfaces the server's `detail` in the banner and rethrows, so a
          // rejected save leaves the modal open with the reason visible on screen.
          if (existing) await App.post(`/api/goals/${existing.id}`, body, "PUT");
          else await App.post("/api/goals", body);
        } catch (_) {
          save.disabled = false;
          return;
        }
        close();
        App.notice(existing ? `Updated ${body.name}` : `Added ${body.name}`);
        render();
      };

      document.body.appendChild(overlay);
      name.focus();
    }

    App.el("new-goal").onclick = () => openGoalModal(null);
    await render();
  })();
</script>
