<!doctype html>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BankApp — Receivables</title>
<link rel="stylesheet" href="/app.css" />
<script src="/vendor/chart.umd.js"></script>
<script src="/app.js"></script>

<main>
  <h1 class="page-title">Receivables</h1>
  <p class="page-sub">Split expenses awaiting reimbursement (e.g. a roommate's share of rent).</p>

  <section class="block">
    <div class="panel scroll-x" id="rec-table"></div>
  </section>

  <section class="block">
    <h2>Outstanding by period</h2>
    <div class="panel" id="rec-chart-panel"><div class="chart-wrap short"><canvas id="rec-chart"></canvas></div></div>
  </section>
</main>

<script>
  (async function () {
    await App.nav();
    await App.loadMeta();
    App.chartTheme();

    const recs = await App.api("/api/receivables");
    const table = App.el("rec-table");
    if (!recs.length) {
      App.empty(table, "No split-expense receivables yet.");
      App.empty(App.el("rec-chart-panel"), "Nothing to chart.");
      return;
    }

    function render() {
      let rows = "";
      for (const r of recs) {
        // "settled" must mean nothing is owed. A nonzero outstanding with a live Settle
        // button can't also read "settled" — derive the badge from outstanding so the
        // status and the button never contradict.
        const trulySettled = r.outstanding_minor === 0;
        const cls = trulySettled ? "dim" : "";
        let statusBadge;
        if (trulySettled) {
          statusBadge = `<span class="badge ok">settled</span>`;
        } else if ((r.received_minor || 0) > 0 || (r.settled_minor || 0) > 0) {
          statusBadge = `<span class="badge pace">partially settled</span>`;
        } else {
          statusBadge = `<span class="badge pace">${App.esc(r.status || "outstanding")}</span>`;
        }
        const action = r.outstanding_minor > 0
          ? `<button class="btn mini ghost" data-settle="${r.group_id}">Settle</button>`
          : "";
        rows +=
          `<tr class="${cls}">` +
          `<td class="desc">${App.esc(r.template)}</td>` +
          `<td>${App.esc(r.period_key)}</td>` +
          `<td>${statusBadge}</td>` +
          `<td class="num">${App.fmtMoney(r.expected_minor, "CAD")}</td>` +
          `<td class="num">${App.fmtMoney(r.received_minor, "CAD")}</td>` +
          `<td class="num">${App.fmtMoney(r.settled_minor, "CAD")}</td>` +
          `<td class="num">${App.fmtMoney(r.outstanding_minor, "CAD")}</td>` +
          `<td class="num">${r.age_days}d</td>` +
          `<td>${action}</td>` +
          `</tr>`;
      }
      table.innerHTML =
        `<table class="tbl"><thead><tr>` +
        `<th>Template</th><th>Period</th><th>Status</th><th class="num">Expected</th><th class="num">Received</th><th class="num">Settled</th><th class="num">Outstanding</th><th class="num">Age</th><th></th>` +
        `</tr></thead><tbody>${rows}</tbody></table>`;

      table.querySelectorAll("[data-settle]").forEach((btn) => {
        btn.onclick = async () => {
          const groupId = Number(btn.dataset.settle);
          if (!confirm("Mark this receivable fully settled? This records a manual (non-bank) reimbursement.")) return;
          btn.disabled = true;
          try {
            await App.post("/api/receivables/settle", { group_id: groupId });
          } catch (_) {
            btn.disabled = false;
            return;
          }
          App.notice("Marked settled.");
          location.reload();
        };
      });
    }
    render();

    const outstanding = recs.filter((r) => r.outstanding_minor > 0);
    if (!outstanding.length) {
      App.empty(App.el("rec-chart-panel"), "Everything is settled.");
      return;
    }
    new Chart(App.el("rec-chart"), {
      type: "bar",
      data: {
        labels: outstanding.map((r) => `${r.template} ${r.period_key}`),
        datasets: [{ label: "outstanding", data: outstanding.map((r) => r.outstanding_minor / 100), backgroundColor: App.cssVar("--neg") + "cc", borderWidth: 0 }],
      },
      options: { plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: (v) => v.toLocaleString() } } } },
    });
  })();
</script>
