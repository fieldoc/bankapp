# bankapp config example. Copy to your config location and edit.
#   Config resolution: $FINANCE_CONFIG
#     > %APPDATA%\bankapp\config.toml  (Windows)
#     > ~/.config/bankapp/config.toml  (macOS/Linux)
#   DB resolution:     $FINANCE_DB > db_path (below)
# All paths are ~-expanded, so this works on both Windows and macOS.

timezone   = "America/Vancouver"
db_path    = "~/finance/finance.db"
ingest_dir = "~/finance/inbox"        # TD file-drop folder

[[accounts]]
key = "td-chequing"
institution = "td"
type = "chequing"
currency = "CAD"
ofx_acctid = ""                        # fill from a real export; enables OFX auto-mapping

[[accounts]]
key = "td-visa"
institution = "td"
type = "visa"
currency = "CAD"
ofx_acctid = ""

[[accounts]]
key = "ws-cash"
institution = "wealthsimple"
type = "cash"
currency = "CAD"

[[accounts]]                           # example: a locked TFSA — counted in net worth,
key = "ws-tfsa"                        # transactions never ingested, reported separately
institution = "wealthsimple"
type = "investment"
currency = "CAD"
locked = true                          # acknowledged, not accessible
ws_account_type = "TFSA"               # disambiguates same-type WS accounts (substring
                                       # of WS unifiedAccountType, e.g. NON_REGISTERED)

[plaid]
enabled     = false                    # flip on after the TP.0 spike succeeds
environment = "production"
# account mapping: Plaid account_id -> accounts.key, filled by `finance plaid link`
# credentials live in the OS keyring, never here

[budgets]                              # per-category monthly limits (CAD)
groceries      = "600.00"
dining         = "250.00"
subscriptions  = "60.00"

[[goals]]                              # the "real joy" fund(s)
# SEED ONLY. `finance init` creates this goal the first time it sees the name, then
# never touches it again -- the app owns it from then on. Add, edit, and archive goals
# on the Goals page. Editing the values below will NOT change a goal that exists, and
# deleting this block will NOT remove one.
name           = "example-trip"
target         = "3000.00"
start_date     = "2026-07-01"
target_date    = "2027-02-01"
allocation_pct = 100                   # share of THIS CURRENCY's net savings; active
                                       # goals in one currency must total <= 100%

[advisor]
leak_threshold = "15.00"               # txns under this feed the leak report

[transfers]
window_days   = 7
tolerance     = "0.00"
seed_patterns = ["tfr-to", "tfr-fr", "eft credit", "eft debit"]   # -> rules(source='seed', role_hint='transfer')

[[templates]]                          # rent - the 3-leg chain (placeholder values; fill real ones)
name = "rent"
kind = "split_expense"
expected_amount    = "2400.00"         # FULL rent (2X)
share              = "1/2"             # 50/50
day_of_month       = 1
expense_account    = "ws-cash"
expense_pattern    = "landlord pattern here"
reimburse_account  = "td-chequing"     # or a list: ["td-chequing", "ws-cash"] if payments land in several accounts
reimburser_pattern = "e-transfer"      # NOTE: TD-via-Plaid anonymizes senders to codes
reimburse_min_amount = "900.00"        # ...so gate by amount: inflows under this are never rent
amount_tolerance   = "5.00"
window_days        = 45
link_transfer      = true
